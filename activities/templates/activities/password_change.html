{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Смена пароля | Fitness App</title>
    <link rel="stylesheet" href="{% static 'activities/css/style.css' %}">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .auth-card h3 { margin-top: 0; color: #333; text-align: center; }
        .auth-card p { font-size: 0.9em; color: #666; }
        
        /* Стилизация стандартной формы Django */
        .auth-card ul { padding-left: 20px; color: #dc3545; font-size: 0.85em; }
        .auth-card input { 
            width: 100%; padding: 12px; margin: 8px 0 15px; 
            border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;
        }
        .btn-save { 
            width: 100%; background: #007bff; color: white; border: none; 
            padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; 
        }
        .btn-back { 
            display: block; text-align: center; margin-top: 15px; 
            color: #888; text-decoration: none; font-size: 0.9em; 
        }
    </style>
</head>
<body>
    <div class="auth-card shadow">
        <h3>🔒 Смена пароля</h3>
        <p>Введите ваш старый пароль, а затем дважды новый.</p>
        
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div style="margin-bottom: 10px;">
                    <label style="font-size: 0.85em; color: #666; font-weight: 500;">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div style="color: #dc3545; font-size: 0.75em; margin-top: -10px; margin-bottom: 10px;">
                            {{ field.errors.0 }}
                        </div>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" class="btn-save">Обновить пароль</button>
        </form>
        
        <a href="{% url 'profile' %}" class="btn-back">← Вернуться в профиль</a>
    </div>
</body>
</html>
