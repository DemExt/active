{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Пароль изменен</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .success-card { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .icon { font-size: 50px; margin-bottom: 20px; }
        .btn-home { display: inline-block; background: #28a745; color: white; padding: 12px 25px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon">✅</div>
        <h3>Пароль успешно изменен!</h3>
        <p>Теперь вы можете использовать новый пароль для входа.</p>
        <a href="{% url 'profile' %}" class="btn-home">В профиль</a>
    </div>
</body>
</html>
