{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация | ARMA Fitness</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .bg-image {
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.7)), 
                              url("{% static 'activities/images/wide-shot-parked-bicycles-shed.jpg' %}");
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.8s ease-out;
        }

        .logo {
            width: 60px;
            height: 60px;
            background: #ff4d4d;
            color: white;
            font-size: 40px;
            font-weight: 900;
            line-height: 60px;
            border-radius: 12px;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(255, 77, 77, 0.3);
        }

        .slogan {
            font-size: 0.8em;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 25px;
            opacity: 0.7;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            box-sizing: border-box;
            outline: none;
            font-size: 1em;
        }

        .btn-reg {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #ff4d4d;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-reg:hover {
            background: #ff3333;
            transform: scale(1.02);
        }

        .links {
            margin-top: 20px;
            font-size: 0.85em;
        }

        .links a {
            color: #ff4d4d;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="bg-image">
        <div class="login-box">
            <div class="logo">A</div>
            <div class="slogan">Стань частью команды</div>
            
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Придумайте логин" required>
                <input type="password" name="password" placeholder="Придумайте пароль" required>
                <!-- Можно добавить подтверждение пароля, если захочешь позже -->
                <button type="submit" class="btn-reg">Создать профиль</button>
            </form>

            <div class="links">
                Уже зарегистрированы? <a href="{% url 'login' %}">Войти</a>
            </div>
            
            {% if error %}
                <p style="color: #ff4d4d; margin-top: 15px; font-weight: bold;">{{ error }}</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
